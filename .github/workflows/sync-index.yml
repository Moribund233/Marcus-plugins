name: Sync Plugin Index

on:
  release:
    types: [published, deleted, edited]

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build index.json from releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python << 'PYEOF'
          import json, os, re, urllib.request, zipfile, io

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "marcus-sync"
          }

          def api(path):
              url = f"https://api.github.com/repos/{repo}/{path}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def release_asset_url(release, filename):
              for asset in release.get("assets", []):
                  if asset["name"] == filename:
                      return asset["url"], asset.get("browser_download_url", "")
              return None, None

          # Fetch all releases
          releases = api("releases?per_page=100")
          TAG_PATTERN = re.compile(r'^(.+)@v?(\d+\.\d+\.\d+.*)$')

          index = {
              "schema_version": 1,
              "updated_at": "",
              "plugins": {}
          }

          for rel in releases:
              match = TAG_PATTERN.match(rel["tag_name"])
              if not match:
                  continue

              plugin_id = match.group(1)
              version = match.group(2)

              if plugin_id not in index["plugins"]:
                  index["plugins"][plugin_id] = {
                      "id": plugin_id,
                      "versions": {},
                      "latest_version": version,
                      "deprecated": False
                  }

              pkg = index["plugins"][plugin_id]

              # Extract manifest from the plugin zip asset
              manifest = {}
              for asset in rel.get("assets", []):
                  if asset["name"].endswith(".marcus-plugin"):
                      dl_url = asset["url"]
                      req = urllib.request.Request(dl_url, headers={**headers, "Accept": "application/octet-stream"})
                      try:
                          with urllib.request.urlopen(req) as resp:
                              zip_data = io.BytesIO(resp.read())
                              with zipfile.ZipFile(zip_data) as zf:
                                  if "marcus-plugin.json" in zf.namelist():
                                      manifest = json.loads(zf.read("marcus-plugin.json"))
                      except:
                          pass
                      break

              pkg["versions"][version] = {
                  "published_at": rel["created_at"][:10],
                  "download_url": (
                      f"https://github.com/{repo}/releases/download/"
                      f"{rel['tag_name']}/{plugin_id}.marcus-plugin"
                  ),
                  "display_name": manifest.get("display_name", plugin_id),
                  "description": manifest.get("description", ""),
                  "categories": manifest.get("categories", []),
                  "contribution": manifest.get("contribution", "terminal"),
                  "min_marcus_version": manifest.get("min_marcus_version", "1.0.0")
              }

              # Deprecation markers
              body = rel.get("body", "") or ""
              if "最终版本" in body or "[deprecated]" in body:
                  pkg["deprecated"] = True
                  pkg["deprecation_message"] = body[:200]

              # Update latest version
              if version > pkg["latest_version"]:
                  pkg["latest_version"] = version
                  if not pkg.get("deprecated"):
                      pkg["deprecated"] = False

          # Sort versions (newest first)
          for pid in index["plugins"]:
              vs = index["plugins"][pid]["versions"]
              index["plugins"][pid]["versions"] = dict(sorted(vs.items(), reverse=True))

          index["updated_at"] = __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          with open("index.json", "w") as f:
              json.dump(index, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Index updated: {len(index['plugins'])} plugins")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "marcus-bot"
          git config user.email "bot@marcus.local"
          git add index.json
          if git diff --cached --quiet; then
            echo "No changes to index.json"
          else
            git commit -m "sync: update plugin index"
            git push
          fi
